baseURL = 'https://numbertheory.github.io/nocti/'
languageCode = 'en-us'
title = 'Nocti'

[module]
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 3

[params]
  google_fonts = [
    ["Inter", "300, 400, 600, 700"],
    ["Fira Code", "500, 700"]
  ]
  sans_serif_font = "Inter"
  secondary_font  = "Inter"
  mono_font       = "Fira Code"

  [params.docs]
    title = "Nocti Documentation"
    darkMode = true
    themeColor = "cyan"
    repoURL = "https://github.com/numbertheory/nocti"
    repoBranch = "main"
    editPage = true
    sidebarIcons = true
    breadcrumbs = true
    toc = true

  [params.social]
    github = "numbertheory/nocti"

[menu]
  [[menu.primary]]
    name  = "Docs"
    url = "docs/"
    identifier = "docs"
    weight = 10
