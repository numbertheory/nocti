name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build and Archive Binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LD_FLAGS="-X nocti/cmd.Version=${VERSION} -s -w"
          mkdir -p dist

          build_and_archive() {
            local os=$1
            local arch=$2
            local binary_name="nocti"
            if [ "$os" = "windows" ]; then
              binary_name="nocti.exe"
            fi

            echo "Building for $os/$arch..."
            GOOS=$os GOARCH=$arch go build -ldflags "$LD_FLAGS" -o "dist/$binary_name" main.go

            cd dist
            if [ "$os" = "windows" ]; then
              zip "nocti-${VERSION}-$os-$arch.zip" "$binary_name"
              rm "$binary_name"
            else
              tar -czvf "nocti-${VERSION}-$os-$arch.tar.gz" "$binary_name"
              rm "$binary_name"
            fi
            cd ..
          }

          # Build for target platforms
          build_and_archive "linux" "amd64"
          build_and_archive "linux" "arm64"
          build_and_archive "darwin" "amd64"
          build_and_archive "darwin" "arm64"
          build_and_archive "windows" "amd64"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
